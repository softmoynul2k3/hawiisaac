services:
  app:
    image: ${IMAGE_NAME:-hawiisaac}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hawiisaac-app
    restart: unless-stopped
    ports:
      - "8070:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_ENGINE: mysql
      REDIS_URL: redis://redis:6379/0
      BASE_URL: ${BASE_URL:-http://localhost:8000/}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hawiisaac_network

  db:
    image: mysql:8-debian        
    container_name: hawiisaac-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-hawiisaac}
      MYSQL_USER: ${DB_USER:-hawiisaac}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hawiisaac}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql   
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hawiisaac_network
  
  redis:
    image: redis:7-alpine
    container_name: hawiisaac-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hawiisaac_network

volumes:
  mysql_data:
  redis_data:
  media_data:

networks:
  hawiisaac_network:
    driver: bridge