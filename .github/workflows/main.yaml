name: Build, Docker & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "Docker Hub credentials are missing. Set DOCKERHUB_USERNAME/DOCKERHUB_TOKEN (or DOCKER_USERNAME/DOCKER_PASSWORD)." >&2
            exit 1
          fi
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Show build inputs
        run: |
          echo "Dockerfile used by CI:"
          nl -ba Dockerfile
          echo
          echo "requirements.txt used by CI:"
          sed -n '1,140p' requirements.txt

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          pull: true
          no-cache: true
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/hykx-backend:latest
            ${{ env.DOCKERHUB_USERNAME }}/hykx-backend:${{ github.sha }}
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_PORT: ${{ secrets.EC2_PORT }}
      EC2_USER: ${{ secrets.EC2_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload compose files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          port: ${{ env.EC2_PORT }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_SSH_PRIVATE_KEY }}
          source: "compose.yml"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.EC2_HOST }}
          port: ${{ env.EC2_PORT }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          envs: DEPLOY_PATH
          script: |
            set -e
            docker compose down
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
