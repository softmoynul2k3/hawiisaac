name: Build, Push and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/hawiisaac

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            echo "=== Starting Deployment ==="

            # Create directory if it doesn't exist
            mkdir -p ~/hawiisaac

            # Create docker-compose.yml on server
            cat > ~/hawiisaac/docker-compose.yml << 'EOF'
            services:
              app:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/hawiisaac:${IMAGE_TAG}
                container_name: hawiisaac-app
                ports:
                  - "8070:8000"
                env_file:
                  - .env
                environment:
                  DB_HOST: db
                  DB_PORT: 3306
                  DB_ENGINE: mysql
                  REDIS_URL: redis://redis:6379/0
                depends_on:
                  db:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                restart: unless-stopped
                networks:
                  - hawiisaac_network

              db:
                image: mysql:8-debian
                container_name: hawiisaac-db
                restart: unless-stopped
                environment:
                  MYSQL_DATABASE: ${DB_NAME:-hawiisaac}
                  MYSQL_USER: ${DB_USER:-hawiisaac}
                  MYSQL_PASSWORD: ${DB_PASSWORD:-hawiisaac}
                  MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
                volumes:
                  - mysql_data:/var/lib/mysql
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_ROOT_PASSWORD:-rootpassword}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - hawiisaac_network

              redis:
                image: redis:7-alpine
                container_name: hawiisaac-redis
                restart: unless-stopped
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - hawiisaac_network

            volumes:
              mysql_data:
              redis_data:

            networks:
              hawiisaac_network:
                driver: bridge
            EOF

            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            echo "Deploying image: ${{ secrets.DOCKERHUB_USERNAME }}/hawiisaac:$IMAGE_TAG"

            # Pull latest image and restart
            cd ~/hawiisaac
            docker compose pull app
            IMAGE_TAG=$IMAGE_TAG docker compose up -d --force-recreate

            # Cleanup old images
            docker image prune -f

            echo "=== Deployment Complete ==="
