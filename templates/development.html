<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FastAPI Dashboard</title>
        <link rel="stylesheet" href="/static/style.css">
        <style>
            .login-lock-btn {
                position: absolute !important;
                z-index: 9999;
                height: 40px;
                width: 150px;
                border-radius: 100px;
                border: 1px solid #fff5;
                background: linear-gradient(135deg, #ff4d6e7a, #ff002b9f);
                color: white;
                font-weight: bold;
                font-size: 15px;
                cursor: pointer;
                border: 1px solid #fff5;
                cursor: pointer;
                transition: all 0.25s ease;
            }
            .login-lock-btn:hover {
                transform: scale(1.05);
                box-shadow: 0 6px 18px rgba(255, 77, 109, 0.5);
                background: linear-gradient(135deg, #fa3459, #fc3052);
            }
            .login-lock-btn:focus {
                outline: none;
            }
            #logoutBtn {
                right: 18px;
            }

            .login-modal {
                position: fixed !important;
                inset: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                background: rgba(3, 10, 26, 0.62);
                -webkit-backdrop-filter: blur(6px);
                backdrop-filter: blur(6px);
                z-index: 9998;
                opacity: 1;
                visibility: visible;
                transition: opacity 0.22s ease, visibility 0.22s ease;
            }

            .login-close-btn {
                position: absolute;
                top: 12px;
                right: 12px;
                width: 38px;
                height: 38px;
                border-radius: 50%;
                border: none;
                cursor: pointer;

                background: linear-gradient(135deg, #fff3, #fff3);
                backdrop-filter: blur(6px);

                display: flex;
                align-items: center;
                justify-content: center;

                transition: all 0.25s ease;
            }

            /* Create cross lines */
            .login-close-btn span {
                position: absolute;
                width: 18px;
                height: 2px;
                background: white;
                border-radius: 2px;
                transition: all 0.25s ease;
            }

            .login-close-btn span:first-child {
                transform: rotate(45deg);
            }

            .login-close-btn span:last-child {
                transform: rotate(-45deg);
            }

            /* Hover Effect */
            .login-close-btn:hover {
                background: linear-gradient(135deg, #ff4d6d, #ff758c);
                transform: rotate(90deg) scale(1.05);
                box-shadow: 0 6px 18px rgba(255, 77, 109, 0.5);
            }

            .login-close-btn:hover span {
                background: #fff;
            }

            .login-modal.is-hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            .login-modal-card {
                width: min(92vw, 430px);
                border-radius: 16px;
                padding: 20px;
                background: linear-gradient(180deg, #fff3, #6b0054c5);
                border: 1px solid rgba(255, 255, 255, 0.15);
                box-shadow: 0 20px 46px rgba(0, 0, 0, 0.42);
                transform: translateY(0) scale(1);
            }

            .popup-login-form {
                display: flex;
                flex-direction: column;
                gap: 8px;
                text-align: left;
                margin-top: 50px;
            }
            .popup-login-form input {
                padding: 10px 12px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.12);
                background: rgba(255, 255, 255, 0.15);
                color: #fff;
            }
            .popup-login-form .popup-submit-btn {
                padding: 10px 12px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.12);
                background: #fff;
                color: #6b0054c5;
                font-weight: bold;
                cursor: pointer;
                margin-top: 8px;
            }

            .beat-badge {
                width: 90px;
                height: 90px;
                margin: 20px auto 15px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;

                background: radial-gradient(circle at center, #ff4d6d, #6b0054c5);
                box-shadow: 0 0 25px rgba(255, 77, 109, 0.6);

                animation: pulseGlow 1.8s infinite ease-in-out;
            }

            .shield-icon {
                width: 50px;
                height: 50px;
                fill: white;
                stroke: white;
                stroke-width: 2;
            }

            .shield-icon .check {
                fill: none;
                stroke-linecap: round;
                stroke-linejoin: round;
                stroke-dasharray: 10;
                stroke-dashoffset: 10;
                animation: drawCheck 2s infinite ease-in-out;
            }

            @keyframes pulseGlow {
                0%, 100% {
                    box-shadow: 0 0 20px rgba(255, 77, 109, 0.5);
                    transform: scale(1);
                }
                50% {
                    box-shadow: 0 0 45px rgba(255, 77, 109, 0.9);
                    transform: scale(1.08);
                }
            }

            @keyframes drawCheck {
                0% { stroke-dashoffset: 10; }
                50% { stroke-dashoffset: 0; }
                100% { stroke-dashoffset: 10; }
            }

        </style>
    </head>
    <body>
    <div class="page">
        <button id="loginLockBtn" class="login-lock-btn" type="button" aria-label="Open login">
            Log In
        </button>
        <button id="logoutBtn" class="login-lock-btn" type="button" aria-label="Log out">
            Log Out
        </button>

        <div id="loginModal" class="login-modal is-hidden" aria-hidden="true">
            <div class="login-modal-card">
                <button id="closeLoginModal" class="login-close-btn" type="button" aria-label="Close login">
                    <span></span>
                    <span></span>
                </button>
                <div class="beat-badge" aria-hidden="true">
                    <svg class="shield-icon" viewBox="0 0 24 24">
                        <path d="M12 2L4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3z"/>
                        <path class="check" d="M9 12l2 2 4-4"/>
                    </svg>
                </div>
                <!-- <h3>Login</h3> -->
                <form id="popupLoginForm" class="popup-login-form">
                    <label for="popupUsername">Username or Email</label>
                    <input id="popupUsername" name="username" type="text" autocomplete="username" required />

                    <label for="popupPassword">Password</label>
                    <input id="popupPassword" name="password" type="password" autocomplete="current-password" required />

                    <button class="popup-submit-btn" type="submit">Sign In</button>
                </form>
                <div style="margin-top: 15px; text-align: center;">
                    <button id="firebaseGoogleLoginBtn" class="popup-submit-btn" type="button">
                        Continue with Google
                    </button>
                    <button id="firebaseAppleLoginBtn" class="popup-submit-btn" type="button">
                        Continue with Apple
                    </button>
                </div>
                <p id="popupLoginMsg" class="popup-login-msg"></p>
            </div>
        </div>

        <h1>FastAPI Dashboard</h1>
        <div class="buttons">
            {% for route in routes %}
                <a class="btn" href="{{ route }}/docs"><span>{{ route }}</span></a>
            {% endfor %}
        </div>
        <!-- Add the background image for parallax -->
        <img src="{{ image_url }}" class="bg-image" />        <div id="signature">
            <p>Developed by : <a href="https://www.moynul.com" target="_blank">Md. Moynul Islam</a></p>
            <span class="designation">Python Developer</span>
        </div>
    </div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const bgImage = document.querySelector('.bg-image');
            let lFollowX = 0, lFollowY = 0, x = 0, y = 0;
            const friction = 1 / 30;

            const loginLockBtn = document.getElementById('loginLockBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const loginModal = document.getElementById('loginModal');
            const closeLoginModal = document.getElementById('closeLoginModal');
            const popupLoginForm = document.getElementById('popupLoginForm');
            const popupLoginMsg = document.getElementById('popupLoginMsg');
            const AUTHORIZED_STORAGE_KEY = 'authorized';
            const SWAGGER_AUTH_STORAGE_KEY = 'swagger-ui.auth';
            const DEFAULT_SCHEME_NAME = 'OAuth2PasswordBearer';
            const DEFAULT_SCHEMA = {
                flow: 'password',
                tokenUrl: '/auth/login_auth2/',
                scopes: {},
                type: 'oauth2'
            };

            function readStoredAuthPayload() {
                const rawValue =
                    localStorage.getItem(AUTHORIZED_STORAGE_KEY) ||
                    sessionStorage.getItem(AUTHORIZED_STORAGE_KEY) ||
                    localStorage.getItem(SWAGGER_AUTH_STORAGE_KEY) ||
                    sessionStorage.getItem(SWAGGER_AUTH_STORAGE_KEY);
                if (!rawValue) return null;
                try {
                    const parsed = JSON.parse(rawValue);
                    return parsed && typeof parsed === 'object' ? parsed : null;
                } catch (_) {
                    return null;
                }
            }

            function getStoredAuthToken() {
                const payload = readStoredAuthPayload();
                if (!payload) return '';
                const entry = payload[DEFAULT_SCHEME_NAME];
                if (!entry || !entry.token) return '';
                return (entry.token.access_token || '').trim();
            }

            function buildStoredAuthPayload({ username = '', password = '', token }) {
                const existingPayload = readStoredAuthPayload() || {};
                const existingEntry = existingPayload[DEFAULT_SCHEME_NAME] || {};
                const normalizedToken = token || existingEntry.token || {};

                const payload = {};
                payload[DEFAULT_SCHEME_NAME] = {
                    schema: existingEntry.schema || DEFAULT_SCHEMA,
                    clientId: existingEntry.clientId || '',
                    name: DEFAULT_SCHEME_NAME,
                    passwordType: existingEntry.passwordType || 'basic',
                    username: username || existingEntry.username || '',
                    token: {
                        access_token: normalizedToken.access_token || '',
                        refresh_token: normalizedToken.refresh_token || '',
                        token_type: normalizedToken.token_type || 'bearer'
                    },
                    clientSecret: existingEntry.clientSecret || '',
                    password: password || existingEntry.password || '',
                    scopes: existingEntry.scopes || []
                };
                return payload;
            }

            function persistAuthToken({ username = '', password = '', token }) {
                if (!token || !token.access_token) return;
                const payload = buildStoredAuthPayload({ username, password, token });
                try {
                    const serialized = JSON.stringify(payload);
                    localStorage.setItem(AUTHORIZED_STORAGE_KEY, serialized);
                    sessionStorage.setItem(AUTHORIZED_STORAGE_KEY, serialized);
                    localStorage.setItem(SWAGGER_AUTH_STORAGE_KEY, serialized);
                    sessionStorage.setItem(SWAGGER_AUTH_STORAGE_KEY, serialized);
                } catch (_) {
                    // Ignore storage failures.
                }
            }

            function clearStoredAuthToken() {
                try {
                    localStorage.removeItem(AUTHORIZED_STORAGE_KEY);
                    localStorage.removeItem('swagger_cookie_token');
                    localStorage.removeItem(SWAGGER_AUTH_STORAGE_KEY);
                    sessionStorage.removeItem(AUTHORIZED_STORAGE_KEY);
                    sessionStorage.removeItem('swagger_cookie_token');
                    sessionStorage.removeItem(SWAGGER_AUTH_STORAGE_KEY);
                } catch (_) {
                    // Ignore storage cleanup failures.
                }
            }

            async function checkLoggedIn() {
                const storedToken = getStoredAuthToken();
                if (storedToken) {
                    return true;
                }

                try {
                    const res = await fetch('/auth/swagger-auth-token', {
                        method: 'GET',
                        credentials: 'include'
                    });
                    if (!res.ok) return false;
                    const data = await res.json().catch(() => ({}));
                    return Boolean(data && data.access_token);
                } catch (_) {
                    return false;
                }
            }

            async function updateAuthButtons() {
                const isLoggedIn = await checkLoggedIn();
                if (loginLockBtn) {
                    loginLockBtn.style.display = isLoggedIn ? 'none' : 'inline-block';
                }
                if (logoutBtn) {
                    logoutBtn.style.display = isLoggedIn ? 'inline-block' : 'none';
                }
            }

            function openLoginModal() {
                loginModal.classList.remove('is-hidden');
                loginModal.classList.add('open');
                loginModal.setAttribute('aria-hidden', 'false');
                document.getElementById('popupUsername').focus();
            }

            function closeModal() {
                loginModal.classList.add('is-hidden');
                loginModal.classList.remove('open');
                loginModal.setAttribute('aria-hidden', 'true');
            }

            if (loginLockBtn) {
                loginLockBtn.addEventListener('click', openLoginModal);
            }
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async () => {
                    try {
                        await fetch('/auth/logout', {
                            method: 'POST',
                            credentials: 'include'
                        });
                        clearStoredAuthToken();
                        await updateAuthButtons();
                    } finally {
                        window.location.reload();
                    }
                });
            }

            if (closeLoginModal) {
                closeLoginModal.addEventListener('click', closeModal);
            }

            if (loginModal) {
                loginModal.addEventListener('click', e => {
                    if (e.target === loginModal) closeModal();
                });
            }

            window.addEventListener('keydown', e => {
                if (e.key === 'Escape' && loginModal.classList.contains('open')) {
                    closeModal();
                }
            });

            if (popupLoginForm) {
                popupLoginForm.addEventListener('submit', async e => {
                    e.preventDefault();

                    popupLoginMsg.textContent = '';
                    popupLoginMsg.classList.remove('error');

                    const username = document.getElementById('popupUsername').value.trim();
                    const password = document.getElementById('popupPassword').value;

                    if (!username || !password) {
                        popupLoginMsg.textContent = 'Please fill username and password.';
                        popupLoginMsg.classList.add('error');
                        return;
                    }

                    try {
                        const body = new URLSearchParams();
                        body.append('grant_type', 'password');
                        body.append('username', username);
                        body.append('password', password);

                        const res = await fetch('/auth/login_auth2', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: body.toString(),
                            credentials: 'include'
                        });

                        const data = await res.json().catch(() => ({}));

                        if (!res.ok) {
                            popupLoginMsg.textContent = data.detail || 'Login failed.';
                            popupLoginMsg.classList.add('error');
                            return;
                        }

                        if (data && data.access_token) {
                            persistAuthToken({
                                username,
                                password,
                                token: {
                                    access_token: data.access_token,
                                    refresh_token: data.refresh_token || '',
                                    token_type: data.token_type || 'bearer'
                                }
                            });
                        }

                        popupLoginMsg.textContent = 'Login success.';
                        setTimeout(() => {
                            closeModal();
                            updateAuthButtons().finally(() => window.location.reload());
                        }, 500);

                    } catch (err) {
                        popupLoginMsg.textContent = 'Network error. Try again.';
                        popupLoginMsg.classList.add('error');
                    }
                });
            }

            function animate() {
                if (!bgImage) return;

                x += (lFollowX - x) * friction;
                y += (lFollowY - y) * friction;

                bgImage.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;

                requestAnimationFrame(animate);
            }

            function handleMove(clientX, clientY) {
                const lMouseX = Math.max(-100, Math.min(100, window.innerWidth / 2 - clientX));
                const lMouseY = Math.max(-100, Math.min(100, window.innerHeight / 2 - clientY));
                lFollowX = (20 * lMouseX) / 100;
                lFollowY = (10 * lMouseY) / 100;
            }

            window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
            window.addEventListener('touchmove', e => {
                if (e.touches.length > 0) {
                    handleMove(e.touches[0].clientX, e.touches[0].clientY);
                }
            });

            window.persistAuthToken = persistAuthToken;
            window.closeLoginModalAfterAuth = closeModal;
            window.updateAuthButtonsAfterAuth = updateAuthButtons;
            animate();
            updateAuthButtons();
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import {
            getAuth,
            GoogleAuthProvider,
            OAuthProvider,
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8V3FuxwAZ42QgngI3wTLuyaypqy7scQ4",
            authDomain: "hykx-4b453.firebaseapp.com",
            projectId: "hykx-4b453",
            storageBucket: "hykx-4b453.firebasestorage.app",
            messagingSenderId: "79513095630",
            appId: "1:79513095630:web:913103c9dd593cd99eaf9f",
            measurementId: "G-7WDDG9VWKQ"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const firebaseAuth = getAuth(firebaseApp);
        const googleProvider = new GoogleAuthProvider();
        const appleProvider = new OAuthProvider("apple.com");

        const firebaseGoogleLoginBtn = document.getElementById("firebaseGoogleLoginBtn");
        const popupLoginMsg = document.getElementById("popupLoginMsg");

        firebaseAppleLoginBtn?.addEventListener("click", async () => {
            try {
                popupLoginMsg.textContent = "";
                popupLoginMsg.classList.remove("error");

                const result = await signInWithPopup(firebaseAuth, appleProvider);
                const idToken = await result.user.getIdToken();

                const res = await fetch("/auth/firebase", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ id_token: idToken })
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    throw new Error(data.detail || "Apple login failed");
                }

                window.persistAuthToken({
                    token: {
                        access_token: data.access_token,
                        refresh_token: data.refresh_token || "",
                        token_type: data.token_type || "bearer"
                    }
                });

                popupLoginMsg.textContent = "Apple login success";

                setTimeout(() => {
                    window.closeLoginModalAfterAuth();
                    window.updateAuthButtonsAfterAuth().finally(() => window.location.reload());
                }, 500);

            } catch (err) {
                popupLoginMsg.textContent = err.message || "Apple login error";
                popupLoginMsg.classList.add("error");
            }
        });

        firebaseGoogleLoginBtn?.addEventListener("click", async () => {
            try {
                popupLoginMsg.textContent = "";

                const result = await signInWithPopup(firebaseAuth, googleProvider);
                const idToken = await result.user.getIdToken();

                const res = await fetch("/auth/firebase", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        id_token: idToken
                    })
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    throw new Error(data.detail || "Firebase login failed");
                }

                window.persistAuthToken({
                    token: {
                        access_token: data.access_token,
                        refresh_token: data.refresh_token || "",
                        token_type: data.token_type || "bearer"
                    }
                });

                popupLoginMsg.textContent = "Google login success";

                setTimeout(() => {
                    window.closeLoginModalAfterAuth();
                    window.updateAuthButtonsAfterAuth().finally(() => window.location.reload());
                }, 500);

            } catch (err) {
                popupLoginMsg.textContent = err.message || "Google login error";
                popupLoginMsg.classList.add("error");
            }
        });
    </script>
</body>
</html>
