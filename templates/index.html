<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Dashboard</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* SCENE (particles container) */
        .scene {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 2;
        }

        /* PARTICLES */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 0, 0, 0.4);
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
        }

        /* BLOBS */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.4;
            animation: floatBlob 8s infinite ease-in-out;
            z-index: 3;
        }

        .blob1 {
            width: 280px;
            height: 280px;
            background: #ffffff;
            top: -60px;
            left: -60px;
        }

        .blob2 {
            width: 320px;
            height: 320px;
            background: #ffffff;
            bottom: -80px;
            right: -80px;
            animation-duration: 10s;
        }

        @keyframes floatBlob {
            0%,100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.25) rotate(45deg); }
        }

        /* BACKGROUND IMAGE */
        .bg-image {
            position: fixed;
            inset: 0;
            width: 110%;
            height: 110%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.9);
        }

        /* CENTER CARD */
        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            max-width: 90%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(255,0,0,0.15);
            text-align: center;
            padding: 40px 30px;
            animation: fadeIn 1s ease;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        /* ICON */
        .icon {
            font-size: 60px;
            color: #ef4444;
            animation: shake 2s infinite;
        }

        @keyframes shake {
            0%,100% { transform: rotate(0); }
            25% { transform: rotate(10deg); }
            50% { transform: rotate(-10deg); }
            75% { transform: rotate(5deg); }
        }

        h1 {
            font-size: 36px;
            margin: 15px 0 10px;
        }

        p {
            color: #6b7280;
        }

        .highlight {
            color: #ef4444;
            font-weight: bold;
        }

        .italic {
            font-style: italic;
            color: #111827;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #ef4444;
            color: white;
            border-radius: 30px;
            text-decoration: none;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* FOOTER */
        #signature .profile {
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: start;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 10px;

            /* background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.2); */

            transition: all 0.35s ease;
        }

        /* HOVER MAGIC */
        /* #signature .profile:hover {
            transform: translateY(0px) scale(1.01);
            box-shadow: 0 0px 40px rgba(0,174,255,0.4);
        } */

        /* AVATAR WRAPPER */
        #signature .avatar {
            position: relative;
            height: 40px;
            width: 40px;
            border-radius: 50%;
            overflow: hidden;

            padding: 2px;
            background: linear-gradient(135deg, #00aeff, #7c3aed);
        }

        /* INNER IMAGE */
        #signature .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        /* ONLINE STATUS DOT */
        #signature .avatar::after {
            content: "";
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: #22c55e;
            border: 2px solid white;
            border-radius: 50%;
        }

        /* TEXT */
        #signature a {
            color: #00aeff;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            display: block;
        }

        /* NAME HOVER EFFECT */
        #signature a:hover {
            text-shadow: 0 0 10px rgba(0,174,255,0.8);
        }

        /* ROLE */
        #signature .designation {
            font-size: 11px;
            color: #3791ff;
        }
        #signature .bio {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
    </style>
</head>

<body>
    <img src={{image_url}} class="bg-image" />

    <!-- Particles -->
    <div class="scene"></div>

    <!-- Blobs -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <!-- Card -->
    <div class="card">
        <div class="icon">⚠️</div>
        <h1>ERROR 404</h1>
        <p>
            You are not ALLOWED to access this page.
        </p>
        <div id="signature">
            <div class="profile">
                <div class="avatar">
                    <img src="https://i.ibb.co.com/kVwG5GPY/Whats-App-Image-2026-04-17-at-3-09-31-PM.jpg" alt="avatar">
                </div>
                <div class="bio">
                    <a href="https://www.moynul.com" target="_blank">Md. Moynul Islam</a>
                    <span class="designation">Python Developer</span>
                </div>
            </div>
        </div>
        <!-- <a href="#" class="btn">Coming Soon</a> -->
    </div>

    <!-- PARTICLES SCRIPT -->
    <script>
        const NUM_PARTICLES = 25;
        const scene = document.querySelector(".scene");

        for (let i = 0; i < NUM_PARTICLES; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            scene.appendChild(p);

            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;

            let vx = (Math.random() - 0.5) * 1.5;
            let vy = (Math.random() - 0.5) * 1.5;

            function animate() {
                x += vx;
                y += vy;

                if (x < 0 || x > window.innerWidth) vx *= -1;
                if (y < 0 || y > window.innerHeight) vy *= -1;

                p.style.transform = `translate(${x}px, ${y}px)`;

                requestAnimationFrame(animate);
            }

            animate();
        }
    </script>

    <!-- PARALLAX BACKGROUND -->
    <script>
        const bgImage = document.querySelector('.bg-image');
        let lFollowX = 0, lFollowY = 0, x = 0, y = 0;
        const friction = 1 / 30;

        function animateBG() {
            x += (lFollowX - x) * friction;
            y += (lFollowY - y) * friction;

            bgImage.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;

            requestAnimationFrame(animateBG);
        }

        function handleMove(clientX, clientY) {
            const lMouseX = Math.max(-100, Math.min(100, window.innerWidth / 2 - clientX));
            const lMouseY = Math.max(-100, Math.min(100, window.innerHeight / 2 - clientY));
            lFollowX = (20 * lMouseX) / 100;
            lFollowY = (10 * lMouseY) / 100;
        }

        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));

        window.addEventListener('touchmove', e => {
            if (e.touches.length > 0) {
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        animateBG();
    </script>

</body>
</html>
